<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trade Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: white; }
        .signal-buy { background: linear-gradient(135deg, #00c853, #00e676); animation: pulse-green 2s infinite; }
        .signal-sell { background: linear-gradient(135deg, #ff1744, #ff5252); animation: pulse-red 2s infinite; }
        .signal-wait { background: #374151; }
        @keyframes pulse-green { 0%,100%{box-shadow:0 0 20px rgba(0,200,83,0.5)}50%{box-shadow:0 0 40px rgba(0,200,83,0.8)} }
        @keyframes pulse-red { 0%,100%{box-shadow:0 0 20px rgba(255,23,68,0.5)}50%{box-shadow:0 0 40px rgba(255,23,68,0.8)} }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Main Container -->
    <div class="w-full max-w-md space-y-6">
        
        <!-- Header -->
        <div class="text-center">
            <h1 class="text-3xl font-bold mb-1">AI Trade Assistant</h1>
            <p class="text-gray-400 text-sm">Real-time market analysis</p>
            <div class="flex items-center justify-center gap-2 mt-2">
                <span id="statusDot" class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span>
                <span id="statusText" class="text-xs text-gray-500">Connecting...</span>
            </div>
        </div>

        <!-- Market Selector -->
        <div class="glass rounded-2xl p-4">
            <select id="symbol" class="w-full bg-transparent text-white text-lg font-semibold outline-none cursor-pointer">
                <option value="BTCUSDT" class="bg-gray-900">Bitcoin (BTC)</option>
                <option value="ETHUSDT" class="bg-gray-900">Ethereum (ETH)</option>
                <option value="SOLUSDT" class="bg-gray-900">Solana (SOL)</option>
                <option value="BNBUSDT" class="bg-gray-900">BNB</option>
                <option value="XRPUSDT" class="bg-gray-900">XRP</option>
                <option value="DOGEUSDT" class="bg-gray-900">Dogecoin</option>
            </select>
        </div>

        <!-- AI Signal Display -->
        <div id="signalBox" class="signal-wait rounded-3xl p-8 text-center transition-all duration-500">
            <div class="text-6xl mb-4" id="signalIcon">⏳</div>
            <div class="text-4xl font-black mb-2" id="signalText">WAIT</div>
            <div class="text-lg opacity-90" id="signalSub">Analyzing market...</div>
        </div>

        <!-- Confidence & Price -->
        <div class="grid grid-cols-2 gap-4">
            <div class="glass rounded-2xl p-4 text-center">
                <div class="text-gray-400 text-xs mb-1">AI Confidence</div>
                <div id="confidence" class="text-2xl font-bold">--%</div>
            </div>
            <div class="glass rounded-2xl p-4 text-center">
                <div class="text-gray-400 text-xs mb-1">Current Price</div>
                <div id="price" class="text-2xl font-bold font-mono">$--</div>
            </div>
        </div>

        <!-- AI Reasoning -->
        <div class="glass rounded-2xl p-4">
            <div class="text-gray-400 text-xs mb-2 uppercase tracking-wider">Why?</div>
            <div id="reason" class="text-sm leading-relaxed">Waiting for market data...</div>
        </div>

        <!-- History -->
        <div class="glass rounded-2xl p-4">
            <div class="flex justify-between items-center mb-3">
                <div class="text-gray-400 text-xs uppercase tracking-wider">Signal History</div>
                <div id="accuracy" class="text-xs text-gray-500">--</div>
            </div>
            <div id="history" class="space-y-2 max-h-32 overflow-y-auto text-sm">
                <div class="text-gray-600 text-center py-4">No signals yet</div>
            </div>
        </div>

        <!-- Refresh -->
        <button onclick="changeMarket()" class="w-full glass hover:bg-white/10 rounded-2xl py-3 text-sm font-medium transition-colors">
            Change Market
        </button>
    </div>

    <script>
        let ws;
        let candles = [];
        let lastSignal = null;
        let signals = [];
        let currentPrice = 0;

        // Start immediately
        document.addEventListener('DOMContentLoaded', () => {
            connectMarket();
            
            document.getElementById('symbol').addEventListener('change', () => {
                connectMarket();
            });
        });

        function connectMarket() {
            const symbol = document.getElementById('symbol').value;
            
            if (ws) ws.close();
            
            updateStatus('connecting');
            candles = [];
            
            // Binance WebSocket for 1-minute candles (fastest signals)
            const wsUrl = `wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@kline_1m`;
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => updateStatus('connected');
            
            ws.onmessage = (e) => {
                const data = JSON.parse(e.data).k;
                const candle = {
                    time: data.t,
                    open: parseFloat(data.o),
                    high: parseFloat(data.h),
                    low: parseFloat(data.l),
                    close: parseFloat(data.c),
                    volume: parseFloat(data.v)
                };
                
                currentPrice = candle.close;
                
                // Store candles
                const idx = candles.findIndex(c => c.time === candle.time);
                if (idx >= 0) candles[idx] = candle;
                else {
                    candles.push(candle);
                    if (candles.length > 100) candles.shift();
                }
                
                // Update price
                document.getElementById('price').textContent = '$' + currentPrice.toLocaleString(undefined, {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
                
                // Analyze when we have enough data
                if (candles.length >= 20) {
                    analyzeMarket();
                }
            };
            
            ws.onerror = () => {
                updateStatus('error');
                setTimeout(connectMarket, 3000);
            };
        }

        function analyzeMarket() {
            const data = candles;
            const price = currentPrice;
            
            // Calculate indicators
            const rsi = calculateRSI(data);
            const ema20 = calculateEMA(data, 20);
            const ema50 = calculateEMA(data, 50);
            const macd = calculateMACD(data);
            const bb = calculateBollinger(data);
            
            // AI Decision Logic
            let buyScore = 0;
            let sellScore = 0;
            let reasons = [];
            
            // 1. RSI Analysis (Weight: 25%)
            if (rsi < 30) {
                buyScore += 25;
                reasons.push('RSI oversold (' + rsi.toFixed(1) + ')');
            } else if (rsi > 70) {
                sellScore += 25;
                reasons.push('RSI overbought (' + rsi.toFixed(1) + ')');
            }
            
            // 2. EMA Trend (Weight: 25%)
            const lastEma20 = ema20[ema20.length - 1];
            const lastEma50 = ema50[ema50.length - 1];
            
            if (price > lastEma20 && lastEma20 > lastEma50) {
                buyScore += 25;
                reasons.push('Price above EMA20 & EMA50 (uptrend)');
            } else if (price < lastEma20 && lastEma20 < lastEma50) {
                sellScore += 25;
                reasons.push('Price below EMA20 & EMA50 (downtrend)');
            }
            
            // 3. MACD Momentum (Weight: 25%)
            if (macd.histogram > 0 && macd.macd > macd.signal) {
                buyScore += 25;
                reasons.push('MACD bullish crossover');
            } else if (macd.histogram < 0 && macd.macd < macd.signal) {
                sellScore += 25;
                reasons.push('MACD bearish crossover');
            }
            
            // 4. Bollinger Bands (Weight: 25%)
            if (price <= bb.lower) {
                buyScore += 25;
                reasons.push('Price at lower Bollinger Band');
            } else if (price >= bb.upper) {
                sellScore += 25;
                reasons.push('Price at upper Bollinger Band');
            }
            
            // Determine signal
            let signal, confidence, icon;
            const threshold = 50; // Minimum score to trigger signal
            
            if (buyScore >= threshold && buyScore > sellScore) {
                signal = 'BUY';
                confidence = buyScore;
                icon = '🚀';
            } else if (sellScore >= threshold && sellScore > buyScore) {
                signal = 'SELL';
                confidence = sellScore;
                icon = '🔻';
            } else {
                signal = 'WAIT';
                confidence = Math.max(buyScore, sellScore);
                icon = '⏳';
            }
            
            // Only update if signal changes or confidence changes significantly
            if (signal !== lastSignal || Math.abs(confidence - (lastConfidence || 0)) > 10) {
                updateSignal(signal, confidence, icon, reasons);
                lastSignal = signal;
                lastConfidence = confidence;
                
                if (signal !== 'WAIT') {
                    addToHistory(signal, confidence, price);
                }
            }
        }

        function updateSignal(signal, confidence, icon, reasons) {
            const box = document.getElementById('signalBox');
            const text = document.getElementById('signalText');
            const sub = document.getElementById('signalSub');
            const iconEl = document.getElementById('signalIcon');
            const confEl = document.getElementById('confidence');
            const reasonEl = document.getElementById('reason');
            
            // Reset classes
            box.className = 'rounded-3xl p-8 text-center transition-all duration-500 ';
            
            if (signal === 'BUY') {
                box.classList.add('signal-buy');
                text.textContent = 'BUY';
                text.className = 'text-4xl font-black mb-2 text-white';
                sub.textContent = 'AI predicts price will go UP';
            } else if (signal === 'SELL') {
                box.classList.add('signal-sell');
                text.textContent = 'SELL';
                text.className = 'text-4xl font-black mb-2 text-white';
                sub.textContent = 'AI predicts price will go DOWN';
            } else {
                box.classList.add('signal-wait');
                text.textContent = 'WAIT';
                text.className = 'text-4xl font-black mb-2 text-gray-400';
                sub.textContent = 'No clear direction yet';
            }
            
            iconEl.textContent = icon;
            confEl.textContent = confidence + '%';
            confEl.className = 'text-2xl font-bold ' + (signal === 'BUY' ? 'text-emerald-400' : signal === 'SELL' ? 'text-red-400' : 'text-gray-400');
            
            reasonEl.textContent = reasons.length > 0 ? reasons.join(' + ') : 'Collecting data...';
        }

        function addToHistory(signal, confidence, price) {
            const history = document.getElementById('history');
            const time = new Date().toLocaleTimeString();
            
            // Remove "No signals" message
            if (history.children.length === 1 && history.children[0].classList.contains('text-center')) {
                history.innerHTML = '';
            }
            
            const item = document.createElement('div');
            item.className = 'flex justify-between items-center p-2 rounded-lg ' + 
                (signal === 'BUY' ? 'bg-emerald-500/20' : 'bg-red-500/20');
            
            item.innerHTML = `
                <div class="flex items-center gap-2">
                    <span class="font-bold ${signal === 'BUY' ? 'text-emerald-400' : 'text-red-400'}">${signal}</span>
                    <span class="text-gray-500 text-xs">${time}</span>
                </div>
                <div class="text-xs text-gray-400">$${price.toFixed(2)}</div>
            `;
            
            history.insertBefore(item, history.firstChild);
            
            // Keep only last 10
            while (history.children.length > 10) {
                history.removeChild(history.lastChild);
            }
            
            // Update accuracy display
            signals.push({ signal, price, time: Date.now() });
            document.getElementById('accuracy').textContent = signals.length + ' signals today';
        }

        // Technical Calculations
        function calculateRSI(data, period = 14) {
            if (data.length < period + 1) return 50;
            let gains = 0, losses = 0;
            for (let i = data.length - period; i < data.length; i++) {
                const change = data[i].close - data[i-1].close;
                if (change > 0) gains += change;
                else losses -= change;
            }
            const rs = (gains / period) / (losses / period || 1);
            return 100 - (100 / (1 + rs));
        }

        function calculateEMA(data, period) {
            const k = 2 / (period + 1);
            let ema = data.slice(0, period).reduce((a, b) => a + b.close, 0) / period;
            for (let i = period; i < data.length; i++) {
                ema = data[i].close * k + ema * (1 - k);
            }
            return [{ value: ema }];
        }

        function calculateMACD(data) {
            const ema12 = calculateEMA(data, 12)[0].value;
            const ema26 = calculateEMA(data, 26)[0].value;
            const macd = ema12 - ema26;
            return { macd, signal: macd * 0.9, histogram: macd * 0.1 };
        }

        function calculateBollinger(data, period = 20) {
            const slice = data.slice(-period);
            const sma = slice.reduce((a, b) => a + b.close, 0) / period;
            const std = Math.sqrt(slice.reduce((a, b) => a + Math.pow(b.close - sma, 2), 0) / period);
            return {
                upper: sma + (std * 2),
                middle: sma,
                lower: sma - (std * 2)
            };
        }

        function updateStatus(status) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (status === 'connected') {
                dot.className = 'w-2 h-2 rounded-full bg-emerald-500';
                text.textContent = 'Live';
                text.className = 'text-xs text-emerald-500';
            } else if (status === 'connecting') {
                dot.className = 'w-2 h-2 rounded-full bg-yellow-500 animate-pulse';
                text.textContent = 'Connecting...';
                text.className = 'text-xs text-yellow-500';
            } else {
                dot.className = 'w-2 h-2 rounded-full bg-red-500';
                text.textContent = 'Error';
                text.className = 'text-xs text-red-500';
            }
        }

        function changeMarket() {
            connectMarket();
        }

        window.addEventListener('beforeunload', () => {
            if (ws) ws.close();
        });
    </script>
</body>
</html>
